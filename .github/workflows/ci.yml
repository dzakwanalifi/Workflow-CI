name: Machine Learning CI Pipeline

on:
  push:
    branches:
      - master
      - main

jobs:
  retrain_and_deploy:
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12.7'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn xgboost pandas numpy

      - name: Run Retraining via MLflow Project
        run: |
          mlflow run MLProject --entry-point main --env-manager local

      - name: Build Docker Image from MLflow Model
        run: |
          RUN_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient(); runs = client.search_runs(experiment_ids=['0']); print(runs[0].info.run_id) if runs else print('')")
          echo "Latest Run ID: $RUN_ID"
          if [ -n "$RUN_ID" ]; then
            mlflow models build-docker -m "runs:/$RUN_ID/model" -n "mamikos-price-predictor:latest" --enable-mlserver --env-manager local
          else
            echo "No runs found to build docker image."
            exit 1
          fi

      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Push Docker Image to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag mamikos-price-predictor:latest "$DOCKERHUB_USERNAME/mamikos-price-predictor:latest"
          docker push "$DOCKERHUB_USERNAME/mamikos-price-predictor:latest"
